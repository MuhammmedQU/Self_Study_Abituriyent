# Alembic Configuration File
# This file is used by alembic migrations

[alembic]
# path to migration scripts
sqlalchemy.url = 

# use the template .mako file
script_location = alembic

sqlalchemy.echo = false

# Set to 'log' to see migration commands logged
sqlalchemy_echo = false

[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
